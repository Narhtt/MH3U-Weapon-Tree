<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">
    <title>Moga Forge | MH3U Weapon Tree</title>
    <link rel="icon" type="image/svg+xml" href="/icons/Weapons/Sword_&_Shield/Sword_&_Shield_Rank_01.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body class="theme-dark">
    <div id="app">
      <header class="app-header">
        <div class="header-content container">
          <div class="brand">
            <img src="/icons/Weapons/Sword_&_Shield/Sword_&_Shield_Rank_01.svg" alt="Moga Forge Logo" class="brand-logo" referrerPolicy="no-referrer">
            <div class="brand-text">
              <h1 class="cinzel">Moga <span class="accent">Forge</span></h1>
              <span class="sub-brand">MH3U Weapon Tree</span>
            </div>
          </div>
          
          <nav class="app-nav">
            <div class="search-box">
              <span class="search-icon">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
              </span>
              <input type="text" id="search-input" placeholder="Rechercher une arme..." autocomplete="off">
              <kbd>Ctrl + K</kbd>
              <div id="search-results" class="search-results-dropdown hidden"></div>
            </div>
            <button id="home-btn" class="btn btn-home">
              <span class="btn-icon"></span>
              Accueil
            </button>
          </nav>
        </div>
      </header>

      <main class="app-main">
        <div id="tree-viewport" class="viewport">
          <div id="tree-canvas" class="canvas">
            <!-- SVG Lines Layer -->
            <svg id="tree-connections" class="connections-layer"></svg>
            <!-- DOM Nodes Layer -->
            <div id="tree-nodes" class="nodes-layer"></div>
          </div>
        </div>
        
        <!-- Empty State / Home Menu -->
        <div id="home-overlay" class="overlay">
          <div class="container">
            <div class="home-sections">
              <section class="home-section">
                <h2 class="cinzel section-title">Sélecteur d'armes</h2>
                <div id="weapon-type-grid" class="weapon-type-grid">
                  <!-- Dynamically populated -->
                </div>
              </section>

              <section id="wishlist-section" class="home-section hidden">
                <h2 class="cinzel section-title" style="display: flex; justify-content: center; align-items: center; gap: 0.5rem;">Ma Wishlist <span class="accent" style="display: flex;"><svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg></span></h2>
                <div id="wishlist-grid" class="weapon-type-grid wishlist-grid">
                  <!-- Dynamically populated -->
                </div>
              </section>
            </div>
          </div>
        </div>
      </main>

      <!-- Premium Modal -->
      <dialog id="weapon-modal" class="premium-modal">
        <div class="modal-wrapper">
          <button id="close-modal" class="modal-close" aria-label="Fermer">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
          <div id="modal-content" class="modal-body">
            <!-- Dynamically populated -->
          </div>
        </div>
      </dialog>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
